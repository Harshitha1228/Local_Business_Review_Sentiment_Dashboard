services:
  - type: web
    name: sentiment-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentiment-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: sentiment-db
    databaseName: sentiment_dashboard
    user: sentiment_user
    plan: free
